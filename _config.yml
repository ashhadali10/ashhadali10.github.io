# _config.yml
title: Ashad Ali | Security Engineer
description: Application Security, DevSecOps, and Bug Bounty Hunting
baseurl: ""  # Empty for user site (ashhadali10.github.io)
url: "https://ashhadali10.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: pretty

# Include _pages folder
include:
  - _pages

# Exclude files from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Plugins (GitHub Pages supported)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Default settings
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
