  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Markdown settings
markdown: kramdown
highlighter: rouge

# URL
baseurl: ""
url: "https://ashhadali10.github.io"
