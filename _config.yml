# Jekyll Configuration
title: Ashad Ali - Security Blog
description: Technical articles on Application Security, DevSecOps, and Bug Bounty
author: Ashad Ali
email: ashhadali2019@gmail.com

# Theme (Choose one from supported list)
theme: jekyll-theme-minimal

# Or use remote theme for better options:
# remote_theme: pages-themes/cayman@v0.2.0

# Plugins
