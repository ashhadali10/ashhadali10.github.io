# Jekyll Configuration
title: Ashad Ali - Security Blog
description: Technical articles on Application Security, DevSecOps, and Bug Bounty
author: Ashad Ali
email: ashhadali2019@gmail.com

# URL Settings
baseurl: ""  # Leave empty for user site
url: "https://ashhadali10.github.io"

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Ashad Ali"
